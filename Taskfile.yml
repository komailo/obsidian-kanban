version: '3'

tasks:
  check:
    desc: "Run full project check"
    cmds:
      - npm ci
      - npm run build --if-present
      - npm run lint

  build:
    desc: "Build the plugin"
    cmds:
      - npm run build

  dev:
    desc: "Build the plugin in development mode"
    cmds:
      - npm run dev

  lint:
    desc: "Run eslint"
    cmds:
      - npm run lint
